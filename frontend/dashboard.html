<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard - Google Auth CrootJS">
    <title>Dashboard | CrootJS Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div id="notification-container"></div>

    <div class="dashboard-container">
        <div class="dashboard-card">
            <img id="user-avatar" class="user-avatar" src="" alt="User Avatar">
            <h1 id="user-name" class="user-name">Loading...</h1>
            <p id="user-email" class="user-email">loading...</p>

            <div class="status-badge">
                <span class="status-dot"></span>
                Authenticated via Google
            </div>

            <br>
            <button id="btn-logout" class="btn-logout" onclick="logout()">
                👋 Logout
            </button>

            <div class="login-info" style="margin-top: 32px;">
                <p>Session berlaku selama 2 jam<br>Cookie disimpan dengan CrootJS</p>
            </div>

            <div class="tech-badges" style="margin-top: 16px;">
                <span class="tech-badge">⚡ CrootJS</span>
                <span class="tech-badge">🔷 Golang</span>
                <span class="tech-badge">🔒 OAuth 2.0</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>Built with CrootJS &amp; Golang • Google OAuth 2.0</p>
    </div>

    <script type="module">
        import { getCookie, deleteCookie } from "https://cdn.jsdelivr.net/gh/jscroot/lib@0.2.8/cookie.js";

        // Cek apakah user sudah login
        const token = getCookie("login");
        if (!token || token === "") {
            window.location.href = "index.html";
        }

        // Tampilkan data user dari cookie
        const name = getCookie("user_name");
        const email = getCookie("user_email");
        const picture = getCookie("user_picture");

        document.getElementById("user-name").textContent = name || "User";
        document.getElementById("user-email").textContent = email || "-";

        const avatarEl = document.getElementById("user-avatar");
        if (picture && picture !== "") {
            avatarEl.src = picture;
        } else {
            avatarEl.src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(name || "U") + "&background=6366f1&color=fff&size=96";
        }

        // Logout function
        window.logout = function() {
            deleteCookie("login");
            deleteCookie("user_name");
            deleteCookie("user_email");
            deleteCookie("user_picture");
            console.log("👋 Logout berhasil");
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
